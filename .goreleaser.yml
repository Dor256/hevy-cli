version: 2

builds:
  - binary: hevy
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format_overrides:
      - goos: windows
        formats: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: hevy

    repository:
      owner: Dor256
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

    install: |
      bin.install "hevy"

    description: "CLI to manage workouts on Hevy. Includes a skill for ai agents to manage workouts for you."
